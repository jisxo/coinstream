services:
  postgres:
    image: postgres:16
    container_name: cdc-postgres
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_wal_senders=8
      - -c
      - max_replication_slots=8
    environment:
      POSTGRES_DB: coinstream
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - cdc_postgres_data:/var/lib/postgresql/data
      - ./cdc/infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d coinstream"]
      interval: 10s
      timeout: 5s
      retries: 15

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: cdc-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: cdc-kafka
    depends_on:
      - zookeeper
    ports:
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

  kafka-connect:
    image: debezium/connect:2.7.0.Final
    container_name: cdc-kafka-connect
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: cdc-connect-cluster
      CONFIG_STORAGE_TOPIC: cdc_connect_configs
      OFFSET_STORAGE_TOPIC: cdc_connect_offsets
      STATUS_STORAGE_TOPIC: cdc_connect_status
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      REST_ADVERTISED_HOST_NAME: kafka-connect
      PLUGIN_PATH: /kafka/connect,/debezium/connectors

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: cdc-clickhouse
    ports:
      - "8124:8123"
      - "9009:9000"
    volumes:
      - cdc_clickhouse_data:/var/lib/clickhouse
      - ./cdc/schemas/cdc_clickhouse.sql:/docker-entrypoint-initdb.d/cdc_clickhouse.sql:ro

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: cdc-kafka-ui
    depends_on:
      - kafka
      - kafka-connect
    ports:
      - "8081:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: cdc-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_NAME: debezium-connect
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_ADDRESS: http://kafka-connect:8083

volumes:
  cdc_postgres_data:
  cdc_clickhouse_data:
