groups:
- name: coinstream-alerts
  rules:
  - alert: CoinStreamProcessorDown
    expr: up{job="processor"} == 0
    for: 1m
    labels:
      severity: critical
    annotations:
      summary: "CoinStream processor is down"
      runbook: "docs/runbook.md#processor-down"

  - alert: KafkaConsumerLagHigh
    expr: max_over_time(processor_lag_seconds[5m]) > 120
    for: 2m
    labels:
      severity: warning
    annotations:
      summary: "Processor lag is high (>{{ $value }}s)"
      runbook: "docs/runbook.md#consumer-lag-high"

  - alert: PipelineFreshnessHigh
    expr: max_over_time(processor_pipeline_freshness_seconds[5m]) > 120
    for: 2m
    labels:
      severity: warning
    annotations:
      summary: "Freshness delay high (>{{ $value }}s)"
      runbook: "docs/runbook.md#freshness-high"

  - alert: E2ELatencyHighP95
    expr: histogram_quantile(0.95, rate(window_emission_latency_seconds_bucket[5m])) * 1000 > 2000
    for: 2m
    labels:
      severity: warning
    annotations:
      summary: "E2E latency p95 high (>{{ $value }}ms)"
      runbook: "docs/runbook.md#e2e-latency-high"
