global:
  scrape_interval: 10s
  evaluation_interval: 10s

rule_files:
  - /etc/prometheus/alert_rules.yml

scrape_configs:
  - job_name: "ingest"
    static_configs:
      - targets: ["coinstream-ingest:8000"]

  - job_name: "processor"
    static_configs:
      - targets: ["coinstream-processor:8000"]

  - job_name: "redpanda"
    static_configs:
      - targets: ["coinstream-redpanda:9644"]
