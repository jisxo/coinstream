global:
  scrape_interval: 5s

rule_files:
  - /etc/prometheus/alert_rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: 'ingest'
    static_configs:
      - targets: ['ingest:8000']

  - job_name: 'processor'
    static_configs:
      - targets: ['processor:8000']

  - job_name: 'redpanda'
    static_configs:
      - targets: ['redpanda:9644']
